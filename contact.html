<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Background with Gradient */
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #EEEEEE;
    color: black; /* Change text color for better contrast */
    text-align: center;
}


        /* Navigation Bar */
        nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 18px;
            transition: background 0.3s;
        }
        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        /* Contact Form Container */
        .contact-container {
            width: 50%;
            margin: 50px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 10px white;
        }

        /* Input Fields */
        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        label {
            font-size: 18px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px #ffdd57;
        }

        /* Submit Button */
        .btn {
            background: #ffdd57;
            color: black;
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffe27a;
            box-shadow: 0 0 10px #ffdd57;
        }

        /* Footer */
        footer {
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
        }

        /* Validation Message */
        .error {
            color: #ff4b2b;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <nav>
        <a href="home.html">Home</a>
        <a href="quiz.html">Quiz</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <h1>Contact Us</h1>
    
    <div class="contact-container">
        <form id="contactForm">
            <div class="input-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
                <p class="error" id="nameError">Name is required.</p>
            </div>

            <div class="input-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <p class="error" id="emailError">Valid email is required.</p>
            </div>

            <div class="input-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Enter your message"></textarea>
                <p class="error" id="messageError">Message cannot be empty.</p>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2025 Quiz Website. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            let isValid = true;

            // Name Validation
            const name = document.getElementById("name").value.trim();
            if (name === "") {
                document.getElementById("nameError").style.display = "block";
                isValid = false;
            } else {
                document.getElementById("nameError").style.display = "none";
            }

            // Email Validation
            const email = document.getElementById("email").value.trim();
            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                document.getElementById("emailError").style.display = "block";
                isValid = false;
            } else {
                document.getElementById("emailError").style.display = "none";
            }

            // Message Validation
            const message = document.getElementById("message").value.trim();
            if (message === "") {
                document.getElementById("messageError").style.display = "block";
                isValid = false;
            } else {
                document.getElementById("messageError").style.display = "none";
            }

            if (!isValid) {
                event.preventDefault();
            } else {
                alert("Thank you for contacting us!");
            }
        });
    </script>

</body>
</html>
